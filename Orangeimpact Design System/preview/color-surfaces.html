<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Surfaces</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="label-row"><b>Surfaces &amp; tints</b><span>Background tokens</span></div>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
  <div style="background:#FFFFFF;border:1px solid #E5E5E5;border-radius:8px;padding:16px;height:90px;display:flex;flex-direction:column;justify-content:space-between"><b style="font-size:13px">Canvas</b><span style="font-size:11px;color:#737373">#FFFFFF · default</span></div>
  <div style="background:#FAFAFA;border:1px solid #E5E5E5;border-radius:8px;padding:16px;height:90px;display:flex;flex-direction:column;justify-content:space-between"><b style="font-size:13px">Subtle</b><span style="font-size:11px;color:#737373">#FAFAFA · list alt row</span></div>
  <div style="background:#F0F0F0;border:1px solid #E5E5E5;border-radius:8px;padding:16px;height:90px;display:flex;flex-direction:column;justify-content:space-between"><b style="font-size:13px">Muted</b><span style="font-size:11px;color:#737373">#F0F0F0 · skeleton</span></div>
  <div style="background:#FFF2E7;border:1px solid #FFE8D7;border-radius:8px;padding:16px;height:90px;display:flex;flex-direction:column;justify-content:space-between"><b style="font-size:13px;color:#C44312">Brand tint</b><span style="font-size:11px;color:#C44312">#FFF2E7 · callout</span></div>
  <div style="background:#E6F1FF;border:1px solid #B0D4FF;border-radius:8px;padding:16px;height:90px;display:flex;flex-direction:column;justify-content:space-between"><b style="font-size:13px;color:#00408C">Accent tint</b><span style="font-size:11px;color:#00408C">#E6F1FF · info</span></div>
  <div style="background:linear-gradient(#FFFFFF,#FFF2E7);border:1px solid #FFE8D7;border-radius:8px;padding:16px;height:90px;display:flex;flex-direction:column;justify-content:space-between"><b style="font-size:13px">Hero gradient</b><span style="font-size:11px;color:#737373">Marketing only</span></div>
  <div style="background:#0A0A0A;border-radius:8px;padding:16px;height:90px;display:flex;flex-direction:column;justify-content:space-between;color:#FFF"><b style="font-size:13px">Scrim 50%</b><span style="font-size:11px;opacity:.7">rgb(10 10 10 / .5)</span></div>
  <div style="background:rgba(255,255,255,.8);backdrop-filter:blur(12px);border:1px solid #E5E5E5;border-radius:8px;padding:16px;height:90px;display:flex;flex-direction:column;justify-content:space-between"><b style="font-size:13px">Sticky glass</b><span style="font-size:11px;color:#737373">blur(12px) · 80%</span></div>
</div>
</body></html>
