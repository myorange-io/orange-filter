<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Logos</title>
<link rel="stylesheet" href="_card.css">
<style>
  .tile { padding: 20px 18px; border-radius: 12px; display: flex; align-items: center; justify-content: center; min-height: 82px; }
  .tile svg { display: block; max-width: 100%; height: auto; }
  .cap { font-size: 11px; color: #737373; letter-spacing: 0.031em; margin-top: 8px; font-weight: 700; }
  .sub { font-size: 10px; color: #A3A3A3; letter-spacing: 0.031em; margin-top: 2px; font-weight: 500; }
  .col { display: flex; flex-direction: column; align-items: stretch; }
  .light { background: #fff; border: 1px solid #E5E5E5; }
  .dark  { background: #0A0A0A; }
  .brand { background: #FF6F1F; }
  .h30 svg { height: 30px; width: auto; }
  .h28 svg { height: 28px; width: auto; }
  .h36 svg { height: 36px; width: auto; }
  h4 { margin: 18px 0 8px; font-size: 12px; color: #525252; letter-spacing: 0.05em; text-transform: uppercase; font-weight: 700; }
  h4:first-of-type { margin-top: 4px; }
</style>
</head>
<body>
<div class="label-row"><b>Brand lockups</b><span>3 brands × 3 variants = 9 logo files</span></div>

<h4>myorange — parent company</h4>
<div class="grid-3"></div>
<h4>orangeimpact — product</h4>
<div class="grid-3"></div>
<h4>orangeletter — newsletter</h4>
<div class="grid-3"></div>

<style>.grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }</style>
<script>
const rows = [
  ["myorange",     "h36", [["light","myorange.svg","Default","On light"],            ["dark","myorange-wordmark-white.svg","Wordmark white","On dark"],            ["brand","myorange-all-white.svg","All white","On brand"]]],
  ["orangeimpact", "h30", [["light","orangeimpact.svg","Default","On light"],        ["dark","orangeimpact-wordmark-white.svg","Wordmark white","On dark"],           ["brand","orangeimpact-all-white.svg","All white","On brand"]]],
  ["orangeletter", "h28", [["light","orangeletter.svg","Default","On light"],        ["dark","orangeletter-wordmark-white.svg","Wordmark white","On dark"],        ["brand","orangeletter-all-white.svg","All white","On brand"]]],
];
const grids = document.querySelectorAll(".grid-3");
rows.forEach(async ([brand, h, cells], i) => {
  for (const [bg, file, variant, use] of cells) {
    const svg = await fetch("../assets/logos/" + file + "?v=2").then(r => r.text());
    const col = document.createElement("div"); col.className = "col";
    col.innerHTML = `<div class="tile ${bg} ${h}">${svg}</div><div class="cap">${variant.toUpperCase()}</div><div class="sub">${use}</div>`;
    grids[i].appendChild(col);
  }
});
</script>
</body></html>
