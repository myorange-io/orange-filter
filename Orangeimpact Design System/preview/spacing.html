<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="label-row"><b>Spacing · 4 px grid</b><span>4 / 8 / 12 / 16 / 20 / 24 / 32 / 40 / 48 / 64 / 80 / 120</span></div>
<div style="display:flex;align-items:flex-end;gap:8px;height:140px">
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:4px;height:4px;background:#FF6F1F"></div><span style="font-size:10px;color:#737373">4</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:8px;height:8px;background:#FF6F1F"></div><span style="font-size:10px;color:#737373">8</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:12px;height:12px;background:#FF6F1F"></div><span style="font-size:10px;color:#737373">12</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:16px;height:16px;background:#FF6F1F"></div><span style="font-size:10px;color:#737373">16</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:20px;height:20px;background:#FF6F1F"></div><span style="font-size:10px;color:#737373">20</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:24px;height:24px;background:#FF6F1F"></div><span style="font-size:10px;color:#737373">24</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:32px;height:32px;background:#FF6F1F"></div><span style="font-size:10px;color:#737373">32</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:40px;height:40px;background:#FF6F1F"></div><span style="font-size:10px;color:#737373">40</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:48px;height:48px;background:#FF6F1F"></div><span style="font-size:10px;color:#737373">48</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:64px;height:64px;background:#FF6F1F"></div><span style="font-size:10px;color:#737373">64</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:80px;height:80px;background:#FF6F1F"></div><span style="font-size:10px;color:#737373">80</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:120px;height:120px;background:#FF6F1F"></div><span style="font-size:10px;color:#737373">120</span></div>
</div>
</body></html>
