<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Blue scale</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="label-row"><b>Blue</b><span>Accent · informational</span></div>
<div style="display:grid;grid-template-columns:repeat(11,1fr);gap:6px">
  <div class="swatch on-light" style="background:#E6F1FF"><span class="scale">50</span><span class="hex">E6F1FF</span></div>
  <div class="swatch on-light" style="background:#B0D4FF"><span class="scale">100</span><span class="hex">B0D4FF</span></div>
  <div class="swatch on-light" style="background:#8AC0FF"><span class="scale">200</span><span class="hex">8AC0FF</span></div>
  <div class="swatch" style="background:#54A3FF"><span class="scale">300</span><span class="hex">54A3FF</span></div>
  <div class="swatch" style="background:#3391FF"><span class="scale">400</span><span class="hex">3391FF</span></div>
  <div class="swatch" style="background:#0075FF;outline:2px solid #171717;outline-offset:2px"><span class="scale">500 ●</span><span class="hex">0075FF</span></div>
  <div class="swatch" style="background:#006AE8"><span class="scale">600</span><span class="hex">006AE8</span></div>
  <div class="swatch" style="background:#0053B5"><span class="scale">700</span><span class="hex">0053B5</span></div>
  <div class="swatch" style="background:#00408C"><span class="scale">800</span><span class="hex">00408C</span></div>
  <div class="swatch" style="background:#00316B"><span class="scale">900</span><span class="hex">00316B</span></div>
  <div class="swatch" style="background:#002147"><span class="scale">950</span><span class="hex">002147</span></div>
</div>
<div style="margin-top:10px;font-size:12px;color:var(--fg-assistive)">● Accent reference — informational callouts, links in dense content, secondary CTAs</div>
</body></html>
