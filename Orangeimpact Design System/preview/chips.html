<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Chips &amp; badges</title>
<link rel="stylesheet" href="_card.css">
<style>
.chip{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:999px;font-size:12px;font-weight:700;line-height:1.2}
.chip-brand{background:#FF6F1F;color:#fff}
.chip-brand-tint{background:#FFF2E7;color:#C44312}
.chip-accent-tint{background:#E6F1FF;color:#00408C}
.chip-neutral{background:#F0F0F0;color:#404040}
.chip-outline{background:#fff;color:#404040;border:1px solid #D4D4D4}
.chip-lg{padding:14px 36px;font-size:28px;border-radius:999px}
</style></head>
<body>
<div class="label-row"><b>Chips &amp; badges</b><span>Pill · sizing · color roles</span></div>
<div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center">
  <span class="chip chip-brand">ver 2.0</span>
  <span class="chip chip-brand-tint">Pro 전용</span>
  <span class="chip chip-accent-tint">정보</span>
  <span class="chip chip-neutral">초안</span>
  <span class="chip chip-outline">태그</span>
  <span class="chip chip-brand">● 진행 중</span>
</div>
<div style="margin-top:14px;display:flex;gap:10px;align-items:center">
  <span class="chip chip-brand chip-lg">ver 2.0</span>
  <span style="font-size:11px;color:#737373">Hero chip · 80 px type · 20 / 60 padding</span>
</div>
</body></html>
