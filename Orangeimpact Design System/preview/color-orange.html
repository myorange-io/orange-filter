<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Orange scale</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="label-row"><b>Orange</b><span>Primary · brand</span></div>
<div style="display:grid;grid-template-columns:repeat(11,1fr);gap:6px">
  <div class="swatch on-light" style="background:#FFF8F3"><span class="scale">50</span><span class="hex">FFF8F3</span></div>
  <div class="swatch on-light" style="background:#FFF2E7"><span class="scale">100</span><span class="hex">FFF2E7</span></div>
  <div class="swatch on-light" style="background:#FFE8D7"><span class="scale">200</span><span class="hex">FFE8D7</span></div>
  <div class="swatch on-light" style="background:#FFD4B3"><span class="scale">300</span><span class="hex">FFD4B3</span></div>
  <div class="swatch on-light" style="background:#FFB780"><span class="scale">400</span><span class="hex">FFB780</span></div>
  <div class="swatch" style="background:#FF964D"><span class="scale">500</span><span class="hex">FF964D</span></div>
  <div class="swatch" style="background:#FF8129"><span class="scale">600</span><span class="hex">FF8129</span></div>
  <div class="swatch" style="background:#FF6F1F;outline:2px solid #171717;outline-offset:2px"><span class="scale">700 ●</span><span class="hex">FF6F1F</span></div>
  <div class="swatch" style="background:#FF5F1A"><span class="scale">800</span><span class="hex">FF5F1A</span></div>
  <div class="swatch" style="background:#E65317"><span class="scale">900</span><span class="hex">E65317</span></div>
  <div class="swatch" style="background:#C44312"><span class="scale">950</span><span class="hex">C44312</span></div>
</div>
<div style="margin-top:10px;font-size:12px;color:var(--fg-assistive)">● Brand reference — primary buttons, chips, focus rings, logo mark</div>
</body></html>
