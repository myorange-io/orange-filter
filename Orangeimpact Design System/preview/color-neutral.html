<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Neutral scale</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="label-row"><b>Neutral</b><span>Zinc · text / surface / border</span></div>
<div style="display:grid;grid-template-columns:repeat(11,1fr);gap:6px">
  <div class="swatch on-light" style="background:#FAFAFA"><span class="scale">50</span><span class="hex">FAFAFA</span></div>
  <div class="swatch on-light" style="background:#F0F0F0"><span class="scale">100</span><span class="hex">F0F0F0</span></div>
  <div class="swatch on-light" style="background:#E5E5E5"><span class="scale">200</span><span class="hex">E5E5E5</span></div>
  <div class="swatch on-light" style="background:#D4D4D4"><span class="scale">300</span><span class="hex">D4D4D4</span></div>
  <div class="swatch on-light" style="background:#A3A3A3"><span class="scale">400</span><span class="hex">A3A3A3</span></div>
  <div class="swatch" style="background:#737373"><span class="scale">500</span><span class="hex">737373</span></div>
  <div class="swatch" style="background:#525252"><span class="scale">600</span><span class="hex">525252</span></div>
  <div class="swatch" style="background:#404040"><span class="scale">700</span><span class="hex">404040</span></div>
  <div class="swatch" style="background:#262626"><span class="scale">800</span><span class="hex">262626</span></div>
  <div class="swatch" style="background:#171717"><span class="scale">900</span><span class="hex">171717</span></div>
  <div class="swatch" style="background:#0A0A0A"><span class="scale">950</span><span class="hex">0A0A0A</span></div>
</div>
<div style="margin-top:10px;font-size:12px;color:var(--fg-assistive)">200 = default border · 400 = disabled/assistive · 800 = body · 950 = strong</div>
</body></html>
