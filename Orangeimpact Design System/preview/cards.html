<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Cards</title>
<link rel="stylesheet" href="_card.css">
<style>
.card{background:#fff;border:1px solid #E5E5E5;border-radius:12px;padding:20px;box-shadow:0 2px 6px rgb(10 10 10 / 0.06);display:flex;flex-direction:column;gap:8px}
.card h4{font-size:18px;font-weight:700;color:#0A0A0A;line-height:1.4}
.card p{font-size:14px;color:#525252;line-height:1.57}
.card .meta{font-size:11px;color:#737373;letter-spacing:0.031em;margin-top:4px;display:flex;gap:8px;align-items:center}
.card.featured{border-color:#FF6F1F;box-shadow:0 2px 6px rgb(10 10 10 / 0.06),inset 0 0 0 1px #FF6F1F}
</style></head>
<body>
<div class="label-row"><b>Cards</b><span>Default · Featured</span></div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
  <div class="card">
    <h4>자연 생태계 복원</h4>
    <p>자연 생태계의 회복과 종다양성의 파괴를 막습니다.</p>
    <div class="meta"><span>초안 · 3시간 전</span><span>·</span><span>44,716 단어</span></div>
  </div>
  <div class="card featured">
    <span style="font-size:11px;font-weight:700;color:#C44312;letter-spacing:0.031em">추천</span>
    <h4>Pro 플랜</h4>
    <p>팀 협업 · 무제한 제안서 · 전담 AI 어시스턴트</p>
    <div class="meta"><span style="color:#FF6F1F;font-weight:700">₩49,000 / 월</span></div>
  </div>
</div>
</body></html>
